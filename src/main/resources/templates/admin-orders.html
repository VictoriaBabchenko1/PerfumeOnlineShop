<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head>
    <meta charset="UTF-8">
    <title>Admin Access - Orders Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
</head>
<body class="d-flex flex-column min-vh-100">
<header th:replace="~{fragments/common-fragments :: navbar}"></header>

<div class="container mt-md-4 pb-5">
    <h1>Admin Access - Orders Management</h1><br>
    <div th:if="${message}" class="alert alert-success" role="alert">
        <span th:text="${message}"></span>
    </div>

    <table class="table align-middle">
        <thead>
        <tr>
            <th>№</th>
            <th>User ID</th>
            <th>Customer</th>
            <th>Email</th>
            <th>City</th>
            <th>Phone</th>
            <th>Post Index</th>
            <th>Date</th>
            <th>Total</th>
            <th>Status</th>
            <th>Items</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.userId}"></td>
            <td th:text="${order.firstName + ' ' + order.lastName}"></td>
            <td th:text="${order.email}"></td>
            <td th:text="${order.city}"></td>
            <td th:text="${order.phoneNumber}"></td>
            <td th:text="${order.postIndex}"></td>
            <td th:text="${#temporals.format(order.dateTime, 'dd-MM-yyyy HH:mm')}"></td>
            <td th:text="'$' + ${order.total}"></td>
            <td>
                <form th:action="@{'/admin/orders/update-status'}" method="post" class="d-flex align-items-center gap-2">
                    <input type="hidden" name="orderId" th:value="${order.id}"/>
                    <select name="status" class="form-select form-select-sm" style="width: auto;">
                        <option th:each="s : ${statuses}"
                                th:value="${s}"
                                th:text="${s}"
                                th:selected="${s} == ${order.status}">
                        </option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-primary">Save</button>
                </form>
            </td>
            <td>
                <button class="btn btn-sm btn-outline-secondary" type="button"
                        data-bs-toggle="collapse"
                        th:attr="data-bs-target='#items-' + ${order.id}"
                        aria-expanded="false">
                    View
                </button>
            </td>
        </tr>
        <tr th:each="order : ${orders}">
            <td colspan="11" class="p-0 border-0">
                <div class="collapse" th:id="'items-' + ${order.id}">
                    <div class="card card-body mt-2">
                        <h6>Order Items</h6>
                        <div th:if="${order.orderItems.isEmpty()}">
                            <span>No items</span>
                        </div>
                        <table class="table mb-0" th:if="${not order.orderItems.isEmpty()}">
                            <thead>
                            <tr>
                                <th>Image</th>
                                <th>Product</th>
                                <th>Qty</th>
                                <th>Price</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${order.orderItems}">
                                <td style="width: 70px;">
                                    <img th:src="@{'/images/perfumes/' + ${item.perfumeBrand.replace(' ', '') + item.perfumeTitle.replace(' ', '') + '.png'}}"
                                         class="img-thumbnail" alt="Perfume Image" style="width: 60px; height: auto;">
                                </td>
                                <td th:text="${item.perfumeBrand + ' ' + item.perfumeTitle}"></td>
                                <td th:text="${item.quantity}"></td>
                                <td th:text="'$' + ${item.price}"></td>
                            </tr>
                            </tbody>
                        </table>

                        <hr/>
                        <h6>Payments</h6>
                        <div th:if="${order.payments.isEmpty()}">
                            <span>No payments</span>
                        </div>
                        <table class="table mb-0" th:if="${not order.payments.isEmpty()}">
                            <thead>
                            <tr>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="payment : ${order.payments}">
                                <td th:text="'$' + ${payment.amount}"></td>
                                <td th:text="${payment.status}"></td>
                                <td th:text="${#temporals.format(payment.createdAt, 'dd-MM-yyyy HH:mm')}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<footer th:replace="~{fragments/common-fragments :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</body>
</html>
